name: "IaC: Bicep Deploy"

on:
  push:
    branches: [main]
    paths: ["infra/bicep/**"]
  pull_request:
    branches: [main]
    paths: ["infra/bicep/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - what-if
          - deploy

env:
  BICEP_DIR: infra/bicep
  LOCATION: eastus2

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # VALIDATE: Runs on every PR and push
  # ──────────────────────────────────────────────
  validate:
    name: "Validate Bicep"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Bicep
        run: az bicep build --file ${{ env.BICEP_DIR }}/main.bicep

  # ──────────────────────────────────────────────
  # WHAT-IF: Preview changes on PR or manual
  # ──────────────────────────────────────────────
  what-if:
    name: "What-If Analysis"
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'what-if')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run What-If
        id: whatif
        run: |
          result=$(az deployment sub what-if \
            --location ${{ env.LOCATION }} \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters ${{ env.BICEP_DIR }}/main.bicepparam \
            --no-pretty-print 2>&1) || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with What-If
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Bicep What-If Analysis 🔍

            \`\`\`
            ${{ steps.whatif.outputs.result }}
            \`\`\`

            *Triggered by @${{ github.actor }} via ${{ github.event_name }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ──────────────────────────────────────────────
  # DEPLOY: Execute on merge to main or manual
  # ──────────────────────────────────────────────
  deploy:
    name: "Deploy to Azure"
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy')
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          az deployment sub create \
            --location ${{ env.LOCATION }} \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters ${{ env.BICEP_DIR }}/main.bicepparam \
            --name "bicep-$(date +%Y%m%d-%H%M%S)"
